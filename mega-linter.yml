APPLY_FIXES: none
DEFAULT_BRANCH: main

ENABLE:
  - YAML
  - JSON
  - MARKDOWN
  - C_SHARP
  - DOCKERFILE
  - ACTION
  - OPENAPI
  - BASH
  - POWERSHELL
  - REPOSITORY

DISABLE:
  - SPELL
  - COPYPASTE

DISABLE_LINTERS:
  - REPOSITORY_CHECKOV
  - REPOSITORY_GRYPE
  - REPOSITORY_TRIVY
  - REPOSITORY_TRIVY_SBOM
  - REPOSITORY_GIT_DIFF
  - REPOSITORY_SECRETLINT
  - REPOSITORY_GITLEAKS
  - REPOSITORY_TRUFFLEHOG
  - YAML_YAMLLINT
  - MARKDOWN_MARKDOWN_LINK_CHECK
  - MARKDOWN_MARKDOWN_TABLE_FORMATTER
  - JSON_PRETTIER
  - BASH_SHFMT
  - BASH_BASH_EXEC
  - POWERSHELL_POWERSHELL
  - C_SHARP_CSHARPIER
  - C_SHARP_ROSLYNATOR

YAML_PRETTIER_ARGUMENTS: "--prose-wrap always"
JSON_JSONLINT_ARGUMENTS: "--quiet"

PRINT_ALPACA: false
SHOW_SKIPPED_LINTERS: false
PARALLEL: true