# MegaLinter configuration
# Runs across the whole repo on every PR

APPLY_FIXES: none
DEFAULT_BRANCH: main

ENABLE:
  - YAML
  - JSON
  - MARKDOWN
  - POWERSHELL
  - C_SHARP
  - DOCKERFILE
  - REPOSITORY

DISABLE_LINTERS:
  - REPOSITORY_DEVSKIM
  - REPOSITORY_GRYPE
  - REPOSITORY_TRIVY
  - REPOSITORY_SEMGREP

YAML_YAMLLINT_ARGUMENTS: "-d relaxed"
JSON_JSONLINT_ARGUMENTS: "--quiet"

C_SHARP_FILTER_REGEX_INCLUDE: "(src/|tests/)"
C_SHARP_DOTNET_FORMAT_ARGUMENTS: "--verbosity quiet"

PRINT_ALPACA: false
SHOW_SKIPPED_LINTERS: false
PARALLEL: true